<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VinFast GIIAS Live Dashboard — Statistik Pemain Booth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="app">

    <header class="topbar">
      <div class="brand-mark">
        <img src="img/vinfast logo vertical.jpg" alt="VinFast Logo" class="brand-logo">
        <div>
          <div class="app-title">VinFast — GIIAS Live Dashboard</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="live-pill"><span class="live-dot"></span> Data live per pemain</div>
      </div>
    </header>

    <div class="theme-fade" id="fadeArea">

      <div class="greeting">
        <h1>Welcome Vinfast Team👋</h1>
        <p>Monitoring. <span class="brand-name-inline">VinFast</span> Player Today</p>
      </div>

      <div class="filter-card">
        <div class="filter-row" style="grid-template-columns: 1fr;">
          <div class="filter-group">
            <label class="filter-label" for="dateRangePicker">📅 Rentang Tanggal</label>
            <input type="text" id="dateRangePicker" class="native-input" placeholder="Pilih tanggal...">
          </div>
        </div>
        <div class="filter-divider" style="margin: 12px 0;"></div>
        <div class="filter-row">
          <div class="filter-group">
            <label class="filter-label" for="startHourPicker">🕐 Dari Jam</label>
            <input type="text" id="startHourPicker" class="native-input" placeholder="00:00">
          </div>
          <div class="filter-group">
            <label class="filter-label" for="endHourPicker">🕐 Sampai Jam</label>
            <input type="text" id="endHourPicker" class="native-input" placeholder="23:00">
          </div>
        </div>
        <div class="filter-actions" style="margin-top: 16px;">
          <button class="filter-reset-btn" id="filterResetBtn">↻ Reset Filter</button>
        </div>
      </div>

      <div class="stats-grid" id="statsGrid"></div>

      <div class="main-grid">
        <div class="card">
          <div class="card-head">
            <h2>Pemain per Jam</h2>
            <span class="tag" id="chartTag">—</span>
          </div>
          <div class="bars" id="barsContainer"></div>
        </div>

        <div class="card">
          <div class="card-head">
            <h2>Pemain Terbaru</h2>
            <span class="tag live-tag">● Live</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID Pemain</th>
                  <th>Waktu Gabung</th>
                  <th>Durasi</th>
                  <th>Skor</th>
                  <th>No HP</th>
                  <th>Email</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="playersTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
  <script src="js/script.js" defer></script>
</body>

</html>
